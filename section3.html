<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> 🙈♥️ ذكرياتنا</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    font-family: Arial, sans-serif;
    transition: background 0.5s, color 0.5s;
    color:#fff;
}

/* الوضع الداكن افتراضي */
body.dark {
    background: url('memories-bg.jpg') center/cover no-repeat;
    color:#fff;
}

/* الوضع الفاتح */
body.light {
    background: url('memories-bg.jpg') center/cover no-repeat;
    color:#000;
}

.phone-frame{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background: rgba(0,0,0,0.7); /* داكن افتراضي */
    padding:20px;
    box-sizing:border-box;
    text-align:center;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    transition: background 0.5s;
}

.phone-frame.light {
    background: rgba(255,230,240,0.85); /* فاتح */
}

h1{
    font-size:30px;
    margin-bottom:20px;
    transition: color 0.5s;
}

/* معرض الصور والفيديو */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.gallery img, .gallery video{
    width:calc(50% - 10px);
    height:120px;
    border-radius:15px;
    object-fit:cover;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    cursor:pointer;
}

/* نافذة منبثقة */
#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction: column;
}

#lightbox img, #lightbox video{
    max-width:90%;
    max-height:90%;
    border-radius:15px;
}

/* زر الموسيقى */
#musicBtn{
    position:absolute;
    top:15px;
    right:15px;
    background:#d63384;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

/* زر الوضع الداكن/الفاتح */
#themeBtn{
    position:absolute;
    top:15px;
    left:15px;
    background:#d63384;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

/* قلوب متحركة حقيقية */
.heart-bg{
    position:fixed;
    font-size:20px;
    top:-50px;
    animation-name:fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    z-index:0;
    pointer-events:none;
    opacity:0.8;
}

@keyframes fall{
    0%{top:-50px; transform:translateX(0) rotate(0deg);}
    25%{transform:translateX(15px) rotate(90deg);}
    50%{transform:translateX(-10px) rotate(180deg);}
    75%{transform:translateX(20px) rotate(270deg);}
    100%{top:110%; transform:translateX(0) rotate(360deg);}
}

/* النصوص داخل الإطار حسب الوضع */
body.dark h1, body.dark .phone-frame{
    color:#fff;
    background: rgba(0,0,0,0.7);
}

body.light h1, body.light .phone-frame{
    color:#000;
    background: rgba(255,230,240,0.85);
}
</style>
</head>
<body class="dark">

<div class="phone-frame" id="frame">

<h1>🙈♥️ ذكرياتنا</h1>

<div class="gallery">
    <img src="pic1.jpg" alt="ذكرياتنا 1">
    <img src="pic2.jpg" alt="ذكرياتنا 2">
    <img src="pic3.jpg" alt="ذكرياتنا 3">
    <video src="video1.mp4"></video>
    <video src="video2.mp4"></video>
</div>

<!-- زر الموسيقى -->
<button id="musicBtn">⏸️</button>

<!-- زر الوضع -->
<button id="themeBtn">☀️</button>

<audio id="music" autoplay loop>
  <source src="memories-music.mp3" type="audio/mpeg">
</audio>

<!-- نافذة منبثقة -->
<div id="lightbox">
    <img id="lightbox-img" src="" style="display:none;">
    <video id="lightbox-video" controls style="display:none;"></video>
</div>

</div>

<script>
// إنشاء قلوب واقعية
const colors = ["#ff4d6d","#ff1a4b","#ff80aa","#ff0066"];
for(let i=0;i<30;i++){
    let heart = document.createElement("div");
    heart.className="heart-bg";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100+"%";
    heart.style.fontSize = (10 + Math.random()*25) + "px";
    heart.style.animationDuration = (4 + Math.random()*5) + "s";
    heart.style.color = colors[Math.floor(Math.random()*colors.length)];
    heart.style.opacity = 0.5 + Math.random()*0.5;
    document.body.appendChild(heart);
}

// التحكم بالموسيقى
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");

musicBtn.addEventListener("click", function(){
    if(music.paused){
        music.play();
        musicBtn.textContent = "⏸️";
    } else {
        music.pause();
        musicBtn.textContent = "▶️";
    }
});

// التحكم بالوضع الداكن/الفاتح
const themeBtn = document.getElementById("themeBtn");
const frame = document.getElementById("frame");
themeBtn.addEventListener("click", ()=>{
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
    frame.classList.toggle("light");
    themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
});

// نافذة الصور والفيديو
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxVideo = document.getElementById("lightbox-video");

// الصور
document.querySelectorAll(".gallery img").forEach(img => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
        lightboxImg.style.display = "block";
        lightboxVideo.style.display = "none";
    });
});

// الفيديوهات
document.querySelectorAll(".gallery video").forEach(video => {
    video.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxVideo.src = video.src;
        lightboxVideo.style.display = "block";
        lightboxImg.style.display = "none";
        lightboxVideo.play();

        if(!music.paused){
            music.pause();
            musicBtn.textContent = "▶️";
        }

        lightboxVideo.onpause = lightboxVideo.onended = () => {
            if(music.paused){
                music.play();
                musicBtn.textContent = "⏸️";
            }
        }
    });
});

// إغلاق النافذة عند النقر خارج المحتوى
lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
    lightboxVideo.pause();
});
</script>

</body>
</html>
